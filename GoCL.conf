# GoCL configuration settings

# ── Texture compression (engine‑side) ── 
[astc.thresholds]
largePixels  = 2097152 
mediumPixels = 1048576  
tightVRAM    = 512 

# ── Rendering / pipeline ── 
[render]
max_frames_in_flight       = 2        # (proxy) 
msaa_samples               = 1        # (engine‑side) 
enable_tessellation        = false    # (engine‑side) 
disable_dgc                = true     # (proxy)
skip_astc_transcode        = true     # (poxy) 

# ── Proxy‑layer overrides (proxy) ── 
preferred_present_mode     = "" 

# ── Software DynamicResolutionHelper emulation ── 
[dynamic_resolution_scaling]
enabled = false           #     (proxy)  
scale   = 0.7             #     (proxy)  
quality = "balanced"      #     (engine‑side utility) 

# ── Meshlet‑based culling (engine‑side utility) ── 
[meshlet_culler]
enabled             = true 

# ── Staging / memory (proxy) ── 
[go_context]
staging_size_MB     = 64 
pipeline_cache_path = "gocl_cache.bin" 